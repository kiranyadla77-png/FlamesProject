<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: color-mix(lightpink 50%, rgb(243, 96, 223) 60%);
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background-image: url("imagesFLAMES/BG2FALMES.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      .box {
        border: solid rgb(6, 194, 251);

        transition: box-shadow 0.3s;
      }
      .box:hover {
        box-shadow: 0px 0px 15px rgba(252, 251, 251, 0.6);
      }
      .Heading {
        color: white;
        text-align: center;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        font-size: 20px;
      }
      .YourName,
      .YourPartnerName {
        border: solid 1px;
        height: 20px;
        font-size: 18px;
        margin-right: 30px;
        border-radius: 10px;
        padding: 5px;
      }
      .text {
        color: white;
        display: inline-block;
        font-size: 19px;
        margin: 0px;
        margin-top: 20px;
        margin-left: 30px;
      }
      .Sumbit {
        margin-left: 150px;
        font-size: 18px;
        margin-top: 30px;
        margin-bottom: 30px;
        background-color: white;
        border: solid 1px;
        cursor: pointer;
        border-radius: 10px;
        padding: 5px;
      }
      .Sumbit:active {
        opacity: 0.5;
      }
      #name1Error,
      #name2Error {
        margin: 0px;
        margin-left: 30px;
        font-size: 12px;
      }
      #remaining,
      #remainingpartner {
        margin: 0px;
        margin-left: 30px;
      }
      .disable {
        cursor: default;
        opacity: 0.5;
      }
      .result-image {
        margin: 0px;
        margin-left: 100px;
        width: 100px;
      }
      .NameDetails {
        margin-left: 40px;
        color: rgb(255, 255, 255);

        transition: font-size 0.4s;
      }
      .NameDetails:hover {
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p class="Heading">FLAMES</p>
      <p class="text">YourName :</p>
      <input class="YourName" id="YourName" placeholder="Enter name" required />
      <p id="name1Error" style="color: red">
        ⚠Enter name without (spaces,specialCharacters and digits(0-9))
      </p>
      <p class="text">PartnerName :</p>
      <input
        class="YourPartnerName"
        id="YourPartnerName"
        placeholder="Enter partner name"
        required
      />
      <p id="name2Error" style="color: red">
        ⚠Enter name without (spaces,specialCharacters and digits(0-9))
      </p>
      <p id="details"></p>
      <p
        id="remaining"
        style="
          color: white;
          font-size: 18px;
          font-weight: bold;
          margin-top: 20px;
          margin-bottom: 5px;
        "
      ></p>
      <p
        id="remainingpartner"
        style="color: white; font-size: 16px; font-weight: bold"
      ></p>
      <p id="imageforresult"></p>
      <p
        id="result"
        style="
          color: white;
          margin-left: 30px;
          font-size: 18px;
          font-weight: bold;
          margin-top: 20px;
        "
      ></p>

      <button id="Sumbit" class="Sumbit">Sumbit</button>
    </div>

    <script src="Flames.js"></script>
  </body>
</html>
